<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>슬로어 · 글쓰기 워밍업</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=IM+Fell+English:ital@0;1&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0d0c0a; --bg2: #141210; --bg3: #1c1a17;
  --ink: #e8e0d0; --muted: #7a6e60;
  --accent: #c4a882; --accent2: #8a6a48;
  --purple: #9b8aaa; --line: #2a2520;
}
html, body { background: var(--bg); color: var(--ink); font-family: 'Noto Serif KR', serif; font-weight: 300; }
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 999; opacity: 0.5;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes glow { 0%,100% { box-shadow:0 0 4px var(--accent); } 50% { box-shadow:0 0 12px var(--accent); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const weeks = [
  {
    num: 1, title: "아케디아", titleEn: "Acedia",
    theme: "침묵을 정확히 명명하기",
    concept: {
      word: "Acedia", kr: "아케디아",
      desc: "애도가 극한에 이를 때 찾아오는 영혼의 정지 상태. 게으름이 아니라, 감정 자체가 얼어붙는 순간. 바르트는 어머니를 잃은 뒤 이 침묵에 이름을 붙였다.",
      barthes: "침묵을 정확히 명명하는 것, 그것이 첫 번째 문장이다."
    },
    prompts: [
      {
        label: "이름 붙이기",
        text: "지금 당신이 쓰지 못하는 이유에 이름을 붙여보세요.\n\"막막하다\"가 아니라 더 정확하게 — 두려움인가요, 피로인가요, 아직 그 사람을 다 이해하지 못한 건가요.\n이름이 붙는 순간, 그것은 이미 첫 문장이 됩니다."
      },
      {
        label: "사진 한 장",
        text: "오늘 혹은 이번 주, 눈이 멈춘 순간을 사진으로 찍어보세요.\n잘 찍은 사진이 아니어도 됩니다.\n그 사진 아래 — 설명 없이 — 딱 세 줄만 써보세요."
      },
      {
        label: "바닥에 있는 것",
        text: "바닥에 오래 머물렀던 것들은 형태가 생기기 시작합니다.\n지금 당신의 바닥에 무엇이 있나요.\n떠오르는 단어, 장면, 냄새, 소리 — 아무거나 하나만 꺼내보세요. 문장이 아니어도 됩니다."
      }
    ]
  },
  {
    num: 2, title: "글쓰기-욕망", titleEn: "Vouloir-écrire",
    theme: "쓰려는 충동 자체가 이미 텍스트의 배아다",
    concept: {
      word: "Vouloir-écrire", kr: "글쓰기-욕망",
      desc: "쓰고 싶다는 충동 자체가 이미 텍스트의 배아다. 써야 한다는 의무와 쓰고 싶다는 욕망은 전혀 다른 것이다. 바르트는 그 차이에서 모든 것이 시작된다고 했다.",
      barthes: "글쓰기를 욕망한다는 것 — 그것은 이미 글쓰기다."
    },
    prompts: [
      {
        label: "두 목록",
        text: "종이를 반으로 나누세요.\n왼쪽에는 '쓰고 싶은 것', 오른쪽에는 '써야 한다고 생각하는 것'.\n지금 어느 쪽이 더 길게 써지나요?"
      },
      {
        label: "충동의 순간",
        text: "마지막으로 뭔가를 쓰고 싶다는 충동이 왔던 순간을 떠올려보세요.\n어디 있었나요. 무엇을 보거나 듣거나 맡았나요.\n그 장면을 그대로 써보세요."
      },
      {
        label: "사진 한 장",
        text: "오늘 '이걸 써두고 싶다'는 마음이 드는 순간을 찍어보세요.\n사진 아래, 그 마음을 세 줄로 적어보세요.\n잘 쓰려 하지 않아도 됩니다."
      }
    ]
  },
  {
    num: 3, title: "하이쿠의 감각", titleEn: "Haïku · Punctum",
    theme: "의미를 설명하지 않고 순간을 착지시키기",
    concept: {
      word: "Haïku / Punctum", kr: "하이쿠 · 푼크툼",
      desc: "하이쿠는 의미를 설명하지 않고 순간을 그대로 착지시키는 것. 푼크툼은 사진 속에서 설명할 수 없는 감동을 경험하게 하는 지점. 의도되지 않았지만 나에게 닿아 오래 머무는 세부.",
      barthes: "하이쿠는 의미를 말하지 않는다. 순간이 그냥 거기 있다."
    },
    prompts: [
      {
        label: "형용사 없이",
        text: "오늘 사진 한 장을 찍으세요.\n그 사진을 세 줄로 쓰되 — 형용사를 쓰지 마세요.\n'아름다운', '조용한', '슬픈' 없이. 장면만."
      },
      {
        label: "푼크툼을 경험하다",
        text: "오늘 혹은 이번 주, 설명할 수 없는데 멈춰지게 한 것이 있었나요.\n이유를 모르겠는데 자꾸 눈이 가는 것, 가슴 어딘가에 닿은 것.\n그것을 사진으로 찍고, 그 감각만 세 줄로 써보세요."
      },
      {
        label: "사토리",
        text: "아무 말도 하지 않는 사진을 찍어보세요.\n설명이 필요 없는 장면.\n아래에 단 한 줄만 — 혹은 아무것도 쓰지 않아도 됩니다."
      }
    ]
  },
  {
    num: 4, title: "데투르", titleEn: "Détour",
    theme: "글과 무관한 것이 글을 데려온다",
    concept: {
      word: "Détour", kr: "데투르",
      desc: "막힐 때 글로 뚫으려 하지 말라. 글과 전혀 무관해 보이는 것들을 향해 우회할 것. 그 돌아가는 길이 오히려 문장을 데려온다. 바르트는 사진, 음악, 산책으로 우회했다.",
      barthes: "가장 긴 우회가 가장 빠른 길이다."
    },
    prompts: [
      {
        label: "나의 우회",
        text: "글이 막힐 때 당신은 어디로 가나요.\n산책, 요리, 음악, 멍하니 창밖 보기...\n그 우회의 장면을 사진으로 찍고 세 줄로 써보세요."
      },
      {
        label: "글과 무관한 것",
        text: "오늘 글쓰기와 전혀 관계없다고 생각되는 것을 찍어보세요.\n그런데 — 그것이 사실 당신의 글과 어떻게 닿아 있나요.\n세 줄로 써보세요."
      },
      {
        label: "우회 목록",
        text: "나를 글로 데려다주는 것 세 가지를 써보세요.\n각각 사진 한 장씩 찍어도 좋고, 하나만 찍어도 됩니다.\n설명보다 장면으로."
      }
    ]
  },
  {
    num: 5, title: "비타 노바", titleEn: "Vita Nova",
    theme: "새로운 형식이 새로운 삶을 연다",
    concept: {
      word: "Vita Nova", kr: "비타 노바",
      desc: "새로운 형식을 발명하는 것이 새로운 삶을 여는 방식이다. 바르트는 마지막 강의에서 소설을 쓰려 했다. 기존 장르에 맞추지 않고 자기만의 그릇을 만드는 것.",
      barthes: "새로운 삶은 새로운 형식을 요구한다."
    },
    prompts: [
      {
        label: "나의 형식",
        text: "당신이 쓰고 싶은 것은 어떤 모양인가요.\n소설도 산문도 일기도 아닌 — 아직 이름 없는 형식.\n그 형식을 상상해서 세 줄로 써보세요."
      },
      {
        label: "새로운 시작",
        text: "지금 이 순간, 새롭게 시작하고 싶은 것을 사진으로 찍어보세요.\n크지 않아도 됩니다. 작은 것도 됩니다.\n그 아래, 시작의 첫 문장만 써보세요."
      },
      {
        label: "형식 실험",
        text: "오늘 평소와 다른 방식으로 써보세요.\n세로로, 혹은 한 단어씩, 혹은 숫자로, 혹은 목록으로.\n내용보다 형식이 먼저인 글."
      }
    ]
  },
  {
    num: 6, title: "낭독", titleEn: "La Voix",
    theme: "문장은 타인의 귀에 닿을 때 완성된다",
    concept: {
      word: "La Voix", kr: "목소리",
      desc: "문장은 타인의 귀에 닿을 때 비로소 완성된다. 바르트는 목소리의 결, 글 표면 아래 흐르는 신체성을 '그레인(grain)'이라 불렀다. 낭독은 발표가 아니라 완성이다.",
      barthes: "목소리는 몸이 언어에 남기는 흔적이다."
    },
    prompts: [
      {
        label: "소리 내어",
        text: "6주 동안 쓴 것 중 가장 마음에 남는 문장 하나를 소리 내어 읽어보세요.\n읽으면서 달라진 것이 있나요.\n그 느낌을 세 줄로 써보세요."
      },
      {
        label: "목소리의 장면",
        text: "누군가의 목소리가 기억에 남는 순간을 사진으로 찍어보세요.\n그 목소리가 있던 장소, 혹은 그 사람이 있던 자리.\n그 아래 세 줄."
      },
      {
        label: "마지막 하이쿠",
        text: "6주를 마치며 — 지금 이 순간을 사진 한 장으로 남겨보세요.\n그리고 6주 전의 나에게 보내는 하이쿠 한 편.\n설명 없이, 장면만."
      }
    ]
  }
];

function App() {
  const [activeWeek, setActiveWeek] = useState(1);
  const [openPrompt, setOpenPrompt] = useState(0);
  const [copied, setCopied] = useState(null);

  const w = weeks[activeWeek - 1];

  function copyText(text, idx) {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(idx);
      setTimeout(() => setCopied(null), 2000);
    });
  }

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>

      {/* Header */}
      <header style={{
        padding: '1.4rem 2rem',
        borderBottom: '1px solid var(--line)',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        position: 'sticky', top: 0,
        background: 'rgba(13,12,10,0.95)', backdropFilter: 'blur(12px)', zIndex: 50
      }}>
        <div style={{ fontFamily: "'IM Fell English',serif", fontStyle:'italic', fontSize:'1.05rem', color:'var(--accent)' }}>
          Slower <span style={{ color:'var(--muted)', fontSize:'0.75rem', fontStyle:'normal', fontFamily:"'Noto Sans KR',sans-serif", fontWeight:300, letterSpacing:'0.1em' }}>글쓰기 워밍업</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <div style={{ width:6, height:6, borderRadius:'50%', background:'var(--accent)', animation:'glow 2s ease infinite' }} />
          <span style={{ fontFamily:"'Noto Sans KR',sans-serif", fontWeight:300, fontSize:'0.7rem', color:'var(--muted)', letterSpacing:'0.1em' }}>슬로어 작가살롱 1기</span>
        </div>
      </header>

      <main style={{ flex:1, maxWidth:660, margin:'0 auto', width:'100%', padding:'2.5rem 1.5rem 6rem' }}>

        {/* Week tabs */}
        <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:'2.5rem' }}>
          {weeks.map(wk => (
            <button key={wk.num} onClick={() => { setActiveWeek(wk.num); setOpenPrompt(0); }} style={{
              padding: '0.4rem 1rem',
              border: `1px solid ${activeWeek === wk.num ? 'var(--accent)' : 'var(--line)'}`,
              background: activeWeek === wk.num ? 'rgba(196,168,130,0.1)' : 'transparent',
              color: activeWeek === wk.num ? 'var(--accent)' : 'var(--muted)',
              fontSize: '0.72rem',
              fontFamily: "'Noto Sans KR',sans-serif", fontWeight:300,
              letterSpacing:'0.08em', cursor:'pointer', borderRadius:2,
              transition:'all 0.2s'
            }}>
              {wk.num}주 · {wk.title}
            </button>
          ))}
        </div>

        {/* Week header */}
        <div style={{ marginBottom:'2rem', animation:'fadeUp 0.4s ease both' }}>
          <div style={{ fontFamily:"'Noto Sans KR',sans-serif", fontWeight:300, fontSize:'0.7rem', color:'var(--muted)', letterSpacing:'0.2em', marginBottom:'0.5rem' }}>
            WEEK {w.num}
          </div>
          <div style={{ fontFamily:"'IM Fell English',serif", fontStyle:'italic', fontSize:'1.8rem', color:'var(--accent)', lineHeight:1.2 }}>
            {w.titleEn}
          </div>
          <div style={{ fontSize:'0.82rem', color:'var(--muted)', marginTop:'0.4rem', fontFamily:"'Noto Sans KR',sans-serif", fontWeight:300 }}>
            {w.theme}
          </div>
        </div>

        {/* Concept card */}
        <div style={{
          border:'1px solid var(--line)', background:'var(--bg2)',
          padding:'1.8rem 2rem', marginBottom:'2rem',
          position:'relative', overflow:'hidden',
          animation:'fadeUp 0.4s ease 0.05s both'
        }}>
          <div style={{ position:'absolute', top:0, left:0, width:3, height:'100%', background:'linear-gradient(to bottom, var(--accent2), transparent)' }} />
          <div style={{ fontFamily:"'Noto Sans KR',sans-serif", fontWeight:300, fontSize:'0.65rem', color:'var(--muted)', letterSpacing:'0.2em', textTransform:'uppercase', marginBottom:'1rem' }}>
            바르트 개념
          </div>
          <div style={{ fontFamily:"'IM Fell English',serif", fontStyle:'italic', fontSize:'1.5rem', color:'var(--accent)', marginBottom:'0.2rem' }}>
            {w.concept.word}
          </div>
          <div style={{ fontSize:'0.78rem', color:'var(--muted)', fontFamily:"'Noto Sans KR',sans-serif", fontWeight:300, marginBottom:'1rem' }}>
            {w.concept.kr}
          </div>
          <div style={{ fontSize:'0.9rem', lineHeight:2, color:'#b0a090', marginBottom:'1.2rem' }}>
            {w.concept.desc}
          </div>
          <div style={{ paddingTop:'1rem', borderTop:'1px solid var(--line)', fontFamily:"'IM Fell English',serif", fontStyle:'italic', fontSize:'0.88rem', color:'var(--purple)', lineHeight:1.9 }}>
            "{w.concept.barthes}"
          </div>
        </div>

        {/* Prompts */}
        <div style={{ animation:'fadeUp 0.4s ease 0.1s both' }}>
          <div style={{
            fontFamily:"'Noto Sans KR',sans-serif", fontSize:'0.65rem', fontWeight:400,
            letterSpacing:'0.22em', textTransform:'uppercase', color:'var(--muted)',
            marginBottom:'1rem', display:'flex', alignItems:'center', gap:'0.8rem'
          }}>
            머물러 생각해보기
            <div style={{ flex:1, height:1, background:'var(--line)' }} />
          </div>

          {w.prompts.map((p, i) => (
            <div key={i} style={{ marginBottom:'0.8rem' }}>
              {/* Prompt header - clickable */}
              <div
                onClick={() => setOpenPrompt(openPrompt === i ? null : i)}
                style={{
                  display:'flex', justifyContent:'space-between', alignItems:'center',
                  padding:'1rem 1.5rem',
                  border:`1px solid ${openPrompt === i ? 'var(--accent2)' : 'var(--line)'}`,
                  background: openPrompt === i ? 'rgba(196,168,130,0.06)' : 'var(--bg2)',
                  cursor:'pointer', transition:'all 0.2s',
                  borderBottom: openPrompt === i ? 'none' : undefined
                }}
              >
                <div style={{ display:'flex', alignItems:'center', gap:'0.8rem' }}>
                  <span style={{ fontFamily:"'IM Fell English',serif", fontStyle:'italic', fontSize:'0.85rem', color:'var(--accent2)' }}>
                    {String(i+1).padStart(2,'0')}
                  </span>
                  <span style={{ fontFamily:"'Noto Sans KR',sans-serif", fontWeight:300, fontSize:'0.85rem', color: openPrompt === i ? 'var(--accent)' : 'var(--ink)' }}>
                    {p.label}
                  </span>
                </div>
                <span style={{ color:'var(--muted)', fontSize:'0.8rem', transition:'transform 0.2s', display:'inline-block', transform: openPrompt === i ? 'rotate(180deg)' : 'none' }}>
                  ↓
                </span>
              </div>

              {/* Prompt body */}
              {openPrompt === i && (
                <div style={{
                  border:'1px solid var(--accent2)', borderTop:'none',
                  background:'var(--bg3)', padding:'1.5rem 2rem'
                }}>
                  <div style={{ fontSize:'0.95rem', lineHeight:2.1, color:'var(--ink)', whiteSpace:'pre-wrap', marginBottom:'1.2rem' }}>
                    {p.text}
                  </div>
                  <button
                    onClick={() => copyText(p.text, i)}
                    style={{
                      background: copied === i ? 'rgba(196,168,130,0.12)' : 'none',
                      border:`1px solid ${copied === i ? 'var(--accent)' : 'var(--line)'}`,
                      color: copied === i ? 'var(--accent)' : 'var(--muted)',
                      fontSize:'0.75rem', fontFamily:"'Noto Sans KR',sans-serif", fontWeight:300,
                      padding:'0.45rem 1.2rem', cursor:'pointer', letterSpacing:'0.1em',
                      transition:'all 0.2s'
                    }}
                  >
                    {copied === i ? '✓ 복사됨' : '복사하기'}
                  </button>
                </div>
              )}
            </div>
          ))}
        </div>

      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
